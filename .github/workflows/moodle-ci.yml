name: Moodle Plugin CI

on: [push, pull_request]

env:
  TZ: Australia/Sydney

jobs:
  test:
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16.6
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_USER: root
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        moodle-branch: ['MOODLE_500_STABLE', 'MOODLE_501_STABLE', 'MOODLE_502_STABLE', 'main']
        database: [pgsql, mariadb]
        exclude:
          # Moodle 5.2 supports PHP 8.3 - 8.4 only.
          - php: '8.2'
            moodle-branch: 'MOODLE_502_STABLE'
          # main (5.3-dev) tracks the 5.2 floor: PHP 8.3 - 8.4.
          - php: '8.2'
            moodle-branch: 'main'

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ matrix.database == 'pgsql' && 'pgsql, pdo_pgsql' || 'mysqli, pdo_mysql' }}, curl, zip, gd, intl, xml, xmlrpc, soap
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        id: install
        run: |
          # Retry the create-project + install up to 3 times with linear
          # backoff so a transient network/composer flake doesn't cascade
          # into "moodle-plugin-ci: command not found" on every later step.
          attempt=1
          until [ "$attempt" -gt 3 ]; do
            echo "::group::moodle-plugin-ci install attempt $attempt"
            if composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4 \
               && echo $(cd ci && pwd)/bin >> $GITHUB_PATH \
               && echo $(cd ci && pwd)/vendor/bin >> $GITHUB_PATH \
               && sudo locale-gen en_AU.UTF-8 \
               && $(cd ci && pwd)/bin/moodle-plugin-ci install \
                    --plugin ./plugin \
                    --db-host=127.0.0.1 \
                    --branch ${{ matrix.moodle-branch }}; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Install attempt $attempt failed; retrying after $((attempt * 10))s."
            sleep $((attempt * 10))
            attempt=$((attempt + 1))
            rm -rf ci
          done
          echo "moodle-plugin-ci install failed after 3 attempts."
          exit 1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci phplint ./plugin

      - name: PHP Copy/Paste Detector
        continue-on-error: true
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci phpcpd ./plugin

      - name: PHP Mess Detector
        continue-on-error: true
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci phpmd ./plugin

      - name: Moodle Code Checker
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci phpcs --max-warnings 0 ./plugin

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci phpdoc --max-warnings 0 ./plugin

      - name: Validate
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci validate ./plugin

      - name: Check upgrade savepoints
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci savepoints ./plugin

      - name: Mustache Lint
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci mustache ./plugin

      - name: PHPUnit tests
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci phpunit --fail-on-warning ./plugin

      - name: Behat features
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci behat --profile chrome --auto-rerun 3 --tags="@datafield_gradeentry" ./plugin
