name: Release

# Build the installable plugin ZIP and attach it to the GitHub Release whenever
# a version tag (e.g. v1.0.0-beta) is pushed. The archive uses the gradeentry/
# prefix so it extracts to the Frankenstyle subplugin directory name expected by
# Moodle (mod/data/field/gradeentry) and the Plugins directory.
#
# The publish step is idempotent: if a release for the tag already exists (for
# example, one created through the GitHub UI), the ZIP is uploaded to it;
# otherwise the release is created. The workflow can also be run manually
# (workflow_dispatch) against an existing tag to (re)attach the ZIP.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to package (e.g. v1.0.0-beta)'
        required: true

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}
          fetch-depth: 0

      - name: Build plugin ZIP
        run: |
          TAG="${{ steps.ref.outputs.tag }}"
          ZIP="datafield_gradeentry-${TAG}.zip"
          git archive --format=zip --prefix=gradeentry/ -o "$ZIP" "$TAG"
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          unzip -l "$ZIP" | head -20

      - name: Publish ZIP to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ref.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" --clobber
          else
            gh release create "$TAG" \
              --title "datafield_gradeentry $TAG" \
              --notes "Automated release build. See CHANGES.md for the changelog." \
              "$ZIP"
          fi
